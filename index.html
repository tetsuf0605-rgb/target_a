<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>チェックシート - 夏休みの目標</title>
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#8b7ec8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="チェックシート">
<style>
  :root{
    /* colors: brand (静かな魔法ファンタジー / 薄紫) */
    --color-main:#8b7ec8;
    --color-main-dark:#6f5fae;
    --color-on-main:#ffffff;
    --color-accent:#f0edfa;

    /* colors: semantic status */
    --color-danger:#e5484d;
    --color-danger-bg:#fdecec;
    --color-success:#2f9e44;

    /* colors: text & surface */
    --color-text:#332e4a;
    --color-text-sub:#7c7398;
    --color-bg:#ffffff;
    --color-card-bg:#fffdfc;
    --color-border:#e6e1f5;
    --color-panel-bg:#f7f5fc;
    --color-btn-sub-bg:#efeaf9;
    --color-calendar-bg:#f5f2fb;
    --color-badge-bg:#ece7f8;
    --color-badge-text:#6f5fae;
    --color-partial-bg:#fff6e0;
    --color-partial-text:#9a6b00;
    --color-axis:#d8d2ea;
    --color-axis-text:#9992b3;
    --color-ideal-line:#c9c2e0;
    --color-overlay:rgba(58,48,86,.5);
    --color-separator:rgba(60,60,67,.29);
    --color-navbar-bg:rgba(255,255,255,.78);
    --color-tabbar-bg:rgba(255,255,255,.82);

    /* typography */
    --font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;

    /* shape (Inset Grouped) */
    --radius:10px;
    --radius-sm:12px;
    --radius-xs:8px;
    --radius-pill:14px;
    --radius-sheet:20px;
    --radius-alert:14px;

    /* layout */
    --tabbar-height:49px;
    --navbar-height:44px;
    --gap:16px;
  }
  *,*::before,*::after{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:var(--font-family);
    font-size:17px;
    letter-spacing:-0.4px;
    color:var(--color-text);
    background:var(--color-bg);
    -webkit-tap-highlight-color:transparent;
  }
  button,input,select{ font-family:inherit; letter-spacing:inherit; }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    background:var(--color-bg);
    position:relative;
  }

  /* ===================== ナビゲーションバー / Large Title ===================== */
  .nav-bar{
    position:sticky;
    top:0;
    height:var(--navbar-height);
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--color-navbar-bg);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    backdrop-filter:blur(20px) saturate(180%);
    border-bottom:1px solid transparent;
    z-index:20;
    overflow:hidden;
    transition:border-color .25s ease;
  }
  .nav-bar::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      radial-gradient(circle at 10% 40%, rgba(139,126,200,.14) 0%, transparent 55%),
      radial-gradient(circle at 92% 60%, rgba(139,126,200,.12) 0%, transparent 50%);
    pointer-events:none;
  }
  .nav-bar.is-collapsed{ border-bottom-color:var(--color-separator); }
  .nav-bar__title{
    position:relative;
    font-size:17px;
    font-weight:600;
    letter-spacing:-0.4px;
    opacity:0;
    transform:translateY(4px);
    transition:opacity .2s ease, transform .2s ease;
  }
  .nav-bar.is-collapsed .nav-bar__title{ opacity:1; transform:translateY(0); }

  .large-title{
    position:relative;
    margin:2px 0 18px;
    font-size:34px;
    font-weight:700;
    letter-spacing:-0.4px;
    color:var(--color-text);
  }
  .large-title::before,.large-title::after{
    content:"✦";
    display:inline-block;
    font-size:14px;
    color:var(--color-main);
    opacity:.45;
    margin:0 8px;
    vertical-align:middle;
  }

  .screen{
    flex:1;
    padding:0 var(--gap) calc(var(--tabbar-height) + env(safe-area-inset-bottom) + var(--gap));
  }

  /* ===================== タブバー ===================== */
  .tabbar{
    position:sticky;
    bottom:0;
    height:calc(var(--tabbar-height) + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom);
    display:flex;
    background:var(--color-tabbar-bg);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    backdrop-filter:blur(20px) saturate(180%);
    border-top:1px solid var(--color-separator);
    z-index:20;
  }
  .tabbar__btn{
    flex:1;
    min-height:44px;
    border:none;
    background:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    padding:6px 4px 0;
    font-size:10px;
    letter-spacing:-0.1px;
    color:var(--color-text-sub);
    transition:opacity .12s ease;
  }
  .tabbar__btn:active{ opacity:.4; }
  .tabbar__btn.is-active{ color:var(--color-main); font-weight:600; }
  .tabbar__icon{ display:block; line-height:0; }
  .tabbar__icon svg{ width:25px; height:25px; display:block; margin:0 auto; }

  .empty-state{
    margin-top:40px;
    text-align:center;
    color:var(--color-text-sub);
  }
  .empty-state__text{ font-size:15px; line-height:1.7; margin-bottom:16px; white-space:pre-wrap; }

  /* ===================== ボタン (Filled / Tinted / Plain) ===================== */
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:44px;
    padding:10px 18px;
    border-radius:var(--radius-sm);
    border:none;
    font-size:17px;
    font-weight:600;
    letter-spacing:-0.4px;
    cursor:pointer;
    transition:opacity .12s ease;
  }
  .btn:not(:disabled):active{ opacity:.4; }
  .btn--primary{ background:var(--color-main); color:var(--color-on-main); }
  .btn--sub{ background:var(--color-btn-sub-bg); color:var(--color-main-dark); }
  .btn--tinted{ background:var(--color-accent); color:var(--color-main-dark); }
  .btn--plain{ background:none; color:var(--color-main); font-weight:400; padding:8px 10px; }
  .btn--danger{ background:var(--color-danger); color:var(--color-on-main); }
  .btn--danger-text{ color:var(--color-danger); }
  .btn--block{ width:100%; }
  .btn--small{ min-height:36px; padding:6px 12px; font-size:14px; }
  .btn--icon{ min-width:40px; min-height:40px; padding:0; font-size:16px; }
  .btn:disabled{ opacity:.4; }

  .today-banner{
    background:var(--color-accent);
    color:var(--color-main-dark);
    border-radius:var(--radius);
    padding:10px 14px;
    font-weight:600;
    font-size:13px;
    margin-bottom:var(--gap);
    text-align:center;
  }
  .date-nav{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    margin-bottom:var(--gap);
  }
  .date-nav__btn{
    width:36px;
    height:36px;
    border-radius:50%;
    border:none;
    background:var(--color-accent);
    color:var(--color-main-dark);
    font-size:16px;
    transition:opacity .12s ease;
  }
  .date-nav__btn:not(:disabled):active{ opacity:.4; }
  .date-nav__btn:disabled{ opacity:.3; }
  .date-nav__label{ font-size:19px; font-weight:700; letter-spacing:-0.4px; min-width:140px; text-align:center; }

  /* ===================== カード (Inset Grouped) ===================== */
  .goal-card{
    position:relative;
    overflow:hidden;
    background:var(--color-card-bg);
    border:1px solid var(--color-border);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:12px;
  }
  .goal-card__title{ font-size:17px; font-weight:600; letter-spacing:-0.4px; margin-bottom:6px; }
  .goal-card__title::before{ content:"✦ "; color:var(--color-main); opacity:.6; }
  .goal-card__week{ font-size:12px; font-weight:400; color:var(--color-text-sub); margin-left:6px; }
  .goal-card__target{ font-size:13px; color:var(--color-text-sub); margin-bottom:8px; }
  .goal-card__big-btn{
    width:100%;
    min-height:56px;
    border-radius:var(--radius-sm);
    border:none;
    background:var(--color-accent);
    color:var(--color-main-dark);
    font-size:19px;
    font-weight:600;
    transition:opacity .12s ease, background-color .2s ease, color .2s ease;
  }
  .goal-card__big-btn:active{ opacity:.4; }
  .goal-card__big-btn.is-done{ background:var(--color-main); color:var(--color-on-main); }
  .goal-card__input-row{ display:flex; gap:8px; align-items:center; }
  .goal-card__input{
    flex:1;
    min-height:44px;
    border:1px solid var(--color-border);
    background:var(--color-panel-bg);
    border-radius:var(--radius-sm);
    padding:0 12px;
    font-size:17px;
    min-width:0;
  }
  .goal-card__achieved{ margin-top:8px; color:var(--color-success); font-weight:600; font-size:15px; }
  .goal-card__total-info{ font-size:14px; margin-top:6px; color:var(--color-text); }

  .summary-card{
    position:relative;
    overflow:hidden;
    background:var(--color-accent);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:12px;
    font-size:14px;
  }
  .summary-card::after{
    content:"";
    position:absolute;
    top:-36px; right:-36px;
    width:130px; height:130px;
    border-radius:50%;
    border:1px solid rgba(111,95,174,.3);
    box-shadow:
      0 0 0 12px rgba(111,95,174,.07),
      0 0 0 26px rgba(111,95,174,.04);
    pointer-events:none;
  }
  .summary-card__row{ display:flex; justify-content:space-between; margin-bottom:4px; }
  .summary-card__row:last-child{ margin-bottom:0; }

  .graph-card{
    background:var(--color-card-bg);
    border:1px solid var(--color-border);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:12px;
  }
  .graph-card__title{ font-size:17px; font-weight:600; letter-spacing:-0.4px; margin-bottom:8px; }
  .graph-card__title::before{ content:"✦ "; color:var(--color-main); opacity:.6; }
  .graph-card__svg{ width:100%; height:auto; display:block; }
  .graph-card__note{ font-size:14px; margin-top:8px; font-weight:600; color:var(--color-main-dark); }
  .graph-card__streak{ font-size:14px; margin-top:8px; }

  .calendar__month-title{ font-size:13px; font-weight:600; margin:10px 0 4px; color:var(--color-text-sub); }
  .calendar__grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
    text-align:center;
  }
  .calendar__weekday{ font-size:11px; color:var(--color-text-sub); }
  .calendar__day{
    position:relative;
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    border-radius:var(--radius-xs);
    background:var(--color-calendar-bg);
    color:var(--color-text);
  }
  .calendar__day--empty{ background:transparent; }
  .calendar__day--achieved{ background:var(--color-accent); color:var(--color-main-dark); font-weight:700; }
  .calendar__day--partial{ background:var(--color-partial-bg); color:var(--color-partial-text); font-weight:700; }
  .calendar__day-mark{ position:absolute; bottom:1px; font-size:9px; }

  /* ===================== 設定: セクション / Inset Grouped リスト ===================== */
  .settings-section{ margin-bottom:28px; }
  .settings-section__title{ font-size:13px; font-weight:600; margin:0 0 8px 4px; color:var(--color-text-sub); }
  .list-group{
    background:var(--color-card-bg);
    border:1px solid var(--color-border);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:12px;
  }
  .list-row{
    position:relative;
    display:flex;
    align-items:center;
    gap:8px;
    padding:12px 14px;
    min-height:44px;
  }
  .list-row + .list-row{ border-top:1px solid var(--color-separator); }
  .list-row:active{ background:var(--color-panel-bg); }
  .list-row__main{ flex:1; min-width:0; }
  .list-row__name{ font-weight:400; font-size:17px; letter-spacing:-0.4px; }
  .list-row__sub{ font-size:13px; color:var(--color-text-sub); margin-top:2px; }
  .list-row__actions{ display:flex; gap:4px; align-items:center; flex-shrink:0; }
  .list-row__chevron{ font-size:18px; color:var(--color-axis-text); margin-left:2px; flex-shrink:0; }
  .badge{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    padding:2px 8px;
    border-radius:var(--radius-pill);
    background:var(--color-badge-bg);
    color:var(--color-badge-text);
    margin-left:6px;
    vertical-align:middle;
  }
  .badge--active{ background:var(--color-main); color:var(--color-on-main); }

  .form-panel{
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:12px;
    background:var(--color-panel-bg);
  }
  .form-group{ margin-bottom:14px; }
  .form-group__label{ display:block; font-size:13px; font-weight:600; color:var(--color-text-sub); margin-bottom:6px; }
  .form-field{
    width:100%;
    min-height:44px;
    border:1px solid var(--color-border);
    border-radius:var(--radius-sm);
    padding:0 12px;
    font-size:17px;
    background:var(--color-bg);
  }
  .form-row{ display:flex; gap:8px; }
  .form-row .form-group{ flex:1; }
  .form-actions{ display:flex; gap:8px; margin-top:12px; }
  .weeks-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .weeks-grid__item label{ font-size:12px; color:var(--color-text-sub); display:block; margin-bottom:2px; }

  /* ===================== ボトムシート ===================== */
  .sheet-overlay{
    position:fixed; inset:0;
    background:var(--color-overlay);
    display:flex; align-items:flex-end; justify-content:center;
    z-index:50;
    animation:overlay-fade-in .25s ease-out;
  }
  .sheet{
    width:100%;
    max-width:520px;
    max-height:88vh;
    background:var(--color-bg);
    border-radius:var(--radius-sheet) var(--radius-sheet) 0 0;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    animation:sheet-slide-up .35s cubic-bezier(.25,.1,.25,1);
  }
  .sheet__grabber{
    flex-shrink:0;
    width:36px; height:5px;
    border-radius:3px;
    background:var(--color-border);
    margin:8px auto;
  }
  .sheet__nav{
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:2px 6px 12px;
    border-bottom:1px solid var(--color-separator);
  }
  .sheet__nav-title{ font-size:17px; font-weight:600; letter-spacing:-0.4px; }
  .sheet__nav-btn{
    background:none; border:none;
    min-height:44px;
    padding:0 10px;
    font-size:17px;
    color:var(--color-main);
    transition:opacity .12s ease;
  }
  .sheet__nav-btn:active{ opacity:.4; }
  .sheet__nav-btn--primary{ font-weight:600; }
  .sheet__body{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
    padding:16px 20px calc(20px + env(safe-area-inset-bottom));
    text-align:left;
  }

  /* ===================== iOS純正風アラート ===================== */
  .alert-overlay{
    position:fixed; inset:0;
    background:var(--color-overlay);
    display:flex; align-items:center; justify-content:center;
    z-index:60;
    padding:20px;
    animation:overlay-fade-in .2s ease-out;
  }
  .alert{
    width:270px;
    max-width:100%;
    background:var(--color-card-bg);
    border-radius:var(--radius-alert);
    overflow:hidden;
    text-align:center;
    animation:alert-pop-in .3s cubic-bezier(.25,.1,.25,1);
  }
  .alert__message{
    margin:0;
    padding:20px 16px 16px;
    font-size:15px;
    line-height:1.5;
    letter-spacing:-0.2px;
    white-space:pre-wrap;
  }
  .alert__actions{ display:flex; border-top:1px solid var(--color-separator); }
  .alert__btn{
    flex:1;
    min-height:44px;
    border:none;
    background:none;
    font-size:17px;
    color:var(--color-main);
    padding:10px 8px;
    transition:background-color .12s ease;
  }
  .alert__btn:active{ background:var(--color-panel-bg); }
  .alert__btn + .alert__btn{ border-left:1px solid var(--color-separator); }
  .alert__btn--default{ font-weight:600; }
  .alert__btn--destructive{ color:var(--color-danger); }

  h2{ font-size:17px; font-weight:600; letter-spacing:-0.4px; margin:0 0 10px; }

  /* ===================== アニメーション ===================== */
  @keyframes overlay-fade-in{ from{ opacity:0; } to{ opacity:1; } }
  @keyframes sheet-slide-up{ from{ transform:translateY(100%); } to{ transform:translateY(0); } }
  @keyframes alert-pop-in{ from{ opacity:0; transform:scale(.92); } to{ opacity:1; transform:scale(1); } }
  @keyframes screen-fade-in{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }
  @media (prefers-reduced-motion:no-preference){
    .screen:not([hidden]){ animation:screen-fade-in .35s cubic-bezier(.25,.1,.25,1); }
  }

  /* ===================== お祝い演出 ===================== */
  @keyframes celebrate-fade-in{ from{ opacity:0; } to{ opacity:1; } }
  @keyframes magic-circle-pop{
    0%{ transform:scale(.4) rotate(0deg); opacity:0; }
    30%{ opacity:1; }
    100%{ transform:scale(1.15) rotate(160deg); opacity:0; }
  }
  @keyframes particle-pop{
    0%{ transform:translate(0,0) scale(.4); opacity:0; }
    20%{ opacity:1; }
    100%{ transform:translate(var(--dx),var(--dy)) scale(1); opacity:0; }
  }
  @keyframes magic-circle-spin{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }
  @keyframes magic-circle-glow{
    from{ filter:drop-shadow(0 0 4px rgba(139,126,200,.6)); }
    to{ filter:drop-shadow(0 0 18px rgba(139,126,200,.95)); }
  }
  @keyframes confetti-fall{
    0%{ transform:translateY(0) rotate(0deg); opacity:0; }
    10%{ opacity:1; }
    100%{ transform:translateY(115vh) rotate(360deg); opacity:.9; }
  }
  @keyframes pillar-rise{
    from{ opacity:0; transform:scaleY(.3); }
    to{ opacity:1; transform:scaleY(1); }
  }

  .celebrate-single{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(255,255,255,.6);
    border-radius:var(--radius);
    z-index:3;
    cursor:pointer;
    animation:celebrate-fade-in .15s ease-out;
  }
  .celebrate-single__circle{ width:64px; height:64px; animation:magic-circle-pop .9s ease-out forwards; }
  .celebrate-single__label{
    margin-top:2px;
    font-size:15px;
    font-weight:700;
    color:var(--color-main-dark);
  }
  .celebrate-single__particle{
    position:absolute;
    font-size:12px;
    color:var(--color-main);
    animation:particle-pop .9s ease-out forwards;
  }

  .celebrate-overlay{
    position:fixed; inset:0;
    background:var(--color-overlay);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    z-index:80;
    cursor:pointer;
    animation:celebrate-fade-in .2s ease-out;
  }
  .celebrate-overlay__content{
    position:relative;
    display:flex; flex-direction:column; align-items:center;
    gap:14px;
    padding:0 24px;
  }
  .celebrate-overlay__circle{
    width:180px; height:180px;
    animation:magic-circle-spin 2.6s linear infinite, magic-circle-glow 1.2s ease-in-out infinite alternate;
  }
  .celebrate-overlay--quest .celebrate-overlay__circle{ width:230px; height:230px; }
  .celebrate-overlay__message{
    font-size:20px;
    font-weight:700;
    color:#fff;
    text-align:center;
    text-shadow:0 2px 10px rgba(0,0,0,.35);
  }
  .celebrate-overlay--quest .celebrate-overlay__message{ font-size:23px; }
  .celebrate-overlay__pillar{
    position:absolute;
    bottom:50%;
    left:50%;
    width:110px;
    height:62vh;
    margin-left:-55px;
    background:linear-gradient(to top, rgba(139,126,200,0) 0%, rgba(139,126,200,.5) 45%, rgba(255,255,255,.85) 100%);
    filter:blur(3px);
    animation:pillar-rise 1s ease-out;
    pointer-events:none;
  }
  .celebrate-confetti{
    position:absolute;
    top:-10%;
    color:#fff;
    text-shadow:0 0 6px rgba(139,126,200,.8);
    animation-name:confetti-fall;
    animation-timing-function:linear;
    animation-fill-mode:forwards;
    pointer-events:none;
  }

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{
      animation-duration:.01ms !important;
      animation-iteration-count:1 !important;
      transition-duration:.01ms !important;
    }
  }
</style>
</head>
<body>
<div id="app">
  <header class="nav-bar" id="navBar">
    <span class="nav-bar__title" id="navBarTitle">今日</span>
  </header>
  <main id="screen-today" class="screen"></main>
  <main id="screen-graph" class="screen" hidden></main>
  <main id="screen-settings" class="screen" hidden></main>
  <nav class="tabbar">
    <button class="tabbar__btn is-active" data-screen="today">
      <span class="tabbar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15" rx="2.5"/><path d="M3.5 9.5h17"/><path d="M8 3v3M16 3v3"/><circle cx="8.2" cy="13.3" r=".9" fill="currentColor" stroke="none"/><circle cx="12" cy="13.3" r=".9" fill="currentColor" stroke="none"/><circle cx="15.8" cy="13.3" r=".9" fill="currentColor" stroke="none"/></svg></span>
      <span>今日</span>
    </button>
    <button class="tabbar__btn" data-screen="graph">
      <span class="tabbar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V10M9.5 19V5M15 19v-7M20 19V8"/></svg></span>
      <span>グラフ</span>
    </button>
    <button class="tabbar__btn" data-screen="settings">
      <span class="tabbar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 3.5v2.2M12 18.3v2.2M20.5 12h-2.2M5.7 12H3.5M17.8 6.2l-1.5 1.5M7.7 16.3l-1.5 1.5M17.8 17.8l-1.5-1.5M7.7 7.7 6.2 6.2"/></svg></span>
      <span>設定</span>
    </button>
  </nav>
</div>
<div id="modalRoot"></div>
<div id="confirmRoot"></div>
<div id="celebrationRoot"></div>

<script>
"use strict";

/* ===================== 定数・状態 ===================== */
var STORAGE_KEY = "target_a_v1";
var state = null;
var ui = {
  screen: "today",
  todayDate: null,
  periodForm: null, // {mode:'add'|'edit', id, name, start, end}
  goalForm: null    // {formMode:'add'|'edit', id, name, type, mode, target, unit, totalTarget, weeks:[]}
};

/* ===================== ユーティリティ ===================== */
function esc(str){
  return String(str).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}
function genId(prefix){
  return prefix + "_" + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}
function pad2(n){ return String(n).padStart(2,"0"); }
function todayStr(){
  var d = new Date();
  return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate());
}
function parseDate(dateStr){
  var parts = dateStr.split("-").map(Number);
  return new Date(parts[0], parts[1]-1, parts[2]);
}
function formatDateStr(d){
  return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate());
}
function addDays(dateStr, n){
  var d = parseDate(dateStr);
  d.setDate(d.getDate()+n);
  return formatDateStr(d);
}
function dateDiffDays(a, b){
  return Math.round((parseDate(b) - parseDate(a)) / 86400000);
}
function formatMD(dateStr){
  var parts = dateStr.split("-");
  return Number(parts[1]) + "月" + Number(parts[2]) + "日";
}
function clampDateToPeriod(dateStr, period){
  if(dateStr < period.start) return period.start;
  if(dateStr > period.end) return period.end;
  return dateStr;
}
function weekNumberOf(period, dateStr){
  return Math.floor(dateDiffDays(period.start, dateStr)/7) + 1;
}
function periodTotalDays(period){
  return dateDiffDays(period.start, period.end) + 1;
}
function periodTotalWeeks(period){
  return Math.ceil(periodTotalDays(period)/7);
}
function weeklyTargetFor(goal, weekNum){
  var idx = Math.min(weekNum-1, goal.weeks.length-1);
  idx = Math.max(idx, 0);
  return goal.weeks[idx] || 0;
}

/* ===================== データ読み書き ===================== */
function defaultState(){
  return { version:1, activePeriodId:null, periods:[], goals:[], records:[] };
}
function loadState(){
  var raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return defaultState();
  try{
    var data = JSON.parse(raw);
    if(!data || typeof data !== "object") throw new Error("invalid");
    if(data.version === 1){
      data.periods = data.periods || [];
      data.goals = data.goals || [];
      data.records = data.records || [];
      if(!data.activePeriodId) data.activePeriodId = null;
      return data;
    }
    throw new Error("unsupported version");
  }catch(e){
    alert("保存データを読み込めませんでした");
    return defaultState();
  }
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

/* ===================== 状態操作ヘルパー ===================== */
function getActivePeriod(){
  if(!state.activePeriodId) return null;
  return state.periods.find(function(p){ return p.id === state.activePeriodId; }) || null;
}
function getGoalsOfActivePeriod(){
  var period = getActivePeriod();
  if(!period) return [];
  return state.goals.filter(function(g){ return g.periodId === period.id; })
    .sort(function(a,b){ return a.order - b.order; });
}
function findRecord(date, goalId){
  return state.records.find(function(r){ return r.date === date && r.goalId === goalId; });
}
function setRecord(date, goalId, value){
  var existing = findRecord(date, goalId);
  if(existing) existing.value = value;
  else state.records.push({ date: date, goalId: goalId, value: value });
  saveState();
}
function deleteRecord(date, goalId){
  state.records = state.records.filter(function(r){ return !(r.date === date && r.goalId === goalId); });
  saveState();
}
function recordsOfGoal(goalId){
  return state.records.filter(function(r){ return r.goalId === goalId; });
}

function addPeriod(data){
  var period = { id: genId("p"), name: data.name, start: data.start, end: data.end };
  state.periods.push(period);
  if(!state.activePeriodId) state.activePeriodId = period.id;
  saveState();
}
function updatePeriod(periodId, patch){
  var period = state.periods.find(function(p){ return p.id === periodId; });
  Object.assign(period, patch);
  saveState();
}
function deletePeriod(periodId){
  var goalIds = state.goals.filter(function(g){ return g.periodId === periodId; }).map(function(g){ return g.id; });
  state.goals = state.goals.filter(function(g){ return g.periodId !== periodId; });
  state.records = state.records.filter(function(r){ return goalIds.indexOf(r.goalId) === -1; });
  state.periods = state.periods.filter(function(p){ return p.id !== periodId; });
  if(state.activePeriodId === periodId){
    state.activePeriodId = state.periods.length ? state.periods[0].id : null;
    var np = getActivePeriod();
    ui.todayDate = np ? clampDateToPeriod(todayStr(), np) : todayStr();
  }
  saveState();
}
function openPeriod(periodId){
  state.activePeriodId = periodId;
  var p = getActivePeriod();
  ui.todayDate = clampDateToPeriod(todayStr(), p);
  saveState();
}

function addGoal(goalData){
  var period = getActivePeriod();
  var existing = state.goals.filter(function(g){ return g.periodId === period.id; });
  var maxOrder = existing.reduce(function(m,g){ return Math.max(m, g.order); }, -1);
  var goal = Object.assign({ id: genId("g"), periodId: period.id, order: maxOrder+1, createdAt: Date.now() }, goalData);
  state.goals.push(goal);
  saveState();
}
function updateGoal(goalId, patch){
  var goal = state.goals.find(function(g){ return g.id === goalId; });
  Object.assign(goal, patch);
  saveState();
}
function deleteGoal(goalId){
  state.goals = state.goals.filter(function(g){ return g.id !== goalId; });
  state.records = state.records.filter(function(r){ return r.goalId !== goalId; });
  saveState();
}
function moveGoal(goalId, direction){
  var list = getGoalsOfActivePeriod();
  var idx = list.findIndex(function(g){ return g.id === goalId; });
  var swapIdx = idx + direction;
  if(swapIdx < 0 || swapIdx >= list.length) return;
  var tmp = list[idx].order;
  list[idx].order = list[swapIdx].order;
  list[swapIdx].order = tmp;
  saveState();
}

function resetAllData(){
  state = defaultState();
  ui.todayDate = todayStr();
  saveState();
}

/* ===================== 確認モーダル(confirmRoot) ===================== */
function showConfirm(message, onConfirm, opts){
  opts = opts || {};
  var root = document.getElementById("confirmRoot");
  var okClass = opts.danger ? "alert__btn--destructive" : "alert__btn--default";
  root.innerHTML =
    '<div class="alert-overlay">' +
      '<div class="alert" role="alertdialog" aria-modal="true">' +
        '<p class="alert__message">' + esc(message) + '</p>' +
        '<div class="alert__actions">' +
          '<button class="alert__btn" data-modal="cancel">' + esc(opts.cancelLabel || "キャンセル") + '</button>' +
          '<button class="alert__btn ' + okClass + '" data-modal="ok">' + esc(opts.okLabel || "はい") + '</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  root.querySelector('[data-modal="cancel"]').onclick = function(){ root.innerHTML = ""; if(opts.onCancel) opts.onCancel(); };
  root.querySelector('[data-modal="ok"]').onclick = function(){ root.innerHTML = ""; onConfirm(); };
}

/* ===================== 目標 編集・追加モーダル(modalRoot、共通部品) ===================== */
function openGoalModal(formMode, goal){
  if(formMode === "edit"){
    ui.goalForm = Object.assign({}, goal, { formMode:"edit" });
  } else {
    ui.goalForm = { formMode:"add", name:"", type:"daily", mode:"check", unit:"", weeks:[] };
  }
  renderGoalModal();
}
function closeGoalModal(){
  ui.goalForm = null;
  document.getElementById("modalRoot").innerHTML = "";
}
function renderGoalModal(){
  var root = document.getElementById("modalRoot");
  if(!ui.goalForm){ root.innerHTML = ""; return; }
  var period = getActivePeriod();
  root.innerHTML = goalModalHtml(ui.goalForm, period);
}
function refreshCurrentScreen(){
  if(ui.screen === "today") renderToday();
  else if(ui.screen === "graph") renderGraph();
  else renderSettings();
}

function goalModalHtml(f, period){
  var title = f.formMode === "edit" ? "目標を編集" : "目標を追加";
  var html = '<div class="sheet-overlay" data-sheet-dismiss="1"><div class="sheet" role="dialog" aria-modal="true">';
  html += '<div class="sheet__grabber"></div>';
  html += '<div class="sheet__nav">' +
    '<button class="sheet__nav-btn" data-action="goal-form-cancel">キャンセル</button>' +
    '<span class="sheet__nav-title">' + title + '</span>' +
    '<button class="sheet__nav-btn sheet__nav-btn--primary" data-action="goal-form-save">保存</button>' +
  '</div>';
  html += '<div class="sheet__body">';
  html += '<div class="form-group"><label class="form-group__label">名前</label>' +
    '<input type="text" class="form-field" id="gf-name" value="' + esc(f.name || "") + '" placeholder="例: なわとび"></div>';
  html += '<div class="form-group"><label class="form-group__label">タイプ</label>' +
    '<select class="form-field" id="gf-type">' +
      '<option value="daily" ' + (f.type==="daily"?"selected":"") + '>毎日 (daily)</option>' +
      '<option value="weekly" ' + (f.type==="weekly"?"selected":"") + '>週ごと (weekly)</option>' +
      '<option value="total" ' + (f.type==="total"?"selected":"") + '>合計 (total)</option>' +
    '</select></div>';

  if(f.type === "daily"){
    html += '<div class="form-group"><label class="form-group__label">記録方式</label>' +
      '<select class="form-field" id="gf-mode">' +
        '<option value="check" ' + (f.mode==="check"?"selected":"") + '>○×式</option>' +
        '<option value="number" ' + (f.mode==="number"?"selected":"") + '>数字式</option>' +
      '</select></div>';
    if(f.mode === "number"){
      html += '<div class="form-row">' +
        '<div class="form-group"><label class="form-group__label">1日の目標</label>' +
          '<input type="number" inputmode="numeric" class="form-field" id="gf-target" value="' + (f.target!=null?f.target:"") + '"></div>' +
        '<div class="form-group"><label class="form-group__label">単位</label>' +
          '<input type="text" class="form-field" id="gf-unit" value="' + esc(f.unit || "") + '" placeholder="例: 回"></div>' +
      '</div>';
    }
  } else if(f.type === "weekly"){
    html += '<div class="form-group"><label class="form-group__label">単位</label>' +
      '<input type="text" class="form-field" id="gf-unit" value="' + esc(f.unit || "") + '" placeholder="例: 回"></div>';
    var totalWeeks = period ? periodTotalWeeks(period) : 1;
    var weeks = f.weeks && f.weeks.length ? f.weeks.slice() : [];
    while(weeks.length < totalWeeks) weeks.push(weeks.length ? weeks[weeks.length-1] : 0);
    html += '<div class="form-group"><label class="form-group__label">週ごとの目標(1日あたり)</label>' +
      '<div class="weeks-grid">';
    for(var i=0;i<totalWeeks;i++){
      html += '<div class="weeks-grid__item"><label>第' + (i+1) + '週</label>' +
        '<input type="number" inputmode="numeric" class="form-field gf-week" data-week-idx="' + i + '" value="' + weeks[i] + '"></div>';
    }
    html += '</div></div>';
  } else if(f.type === "total"){
    html += '<div class="form-row">' +
      '<div class="form-group"><label class="form-group__label">期間中の合計目標</label>' +
        '<input type="number" inputmode="numeric" class="form-field" id="gf-total-target" value="' + (f.totalTarget!=null?f.totalTarget:"") + '"></div>' +
      '<div class="form-group"><label class="form-group__label">単位</label>' +
        '<input type="text" class="form-field" id="gf-unit" value="' + esc(f.unit || "") + '" placeholder="例: ページ"></div>' +
    '</div>';
  }

  html += '</div>';
  html += '</div></div>';
  return html;
}

function readGoalFormFromDom(){
  var name = document.getElementById("gf-name").value.trim();
  var type = document.getElementById("gf-type").value;
  var data = { name: name, type: type };
  if(type === "daily"){
    var mode = document.getElementById("gf-mode").value;
    data.mode = mode;
    if(mode === "number"){
      data.target = Number(document.getElementById("gf-target").value);
      data.unit = document.getElementById("gf-unit").value.trim();
    }
  } else if(type === "weekly"){
    data.unit = document.getElementById("gf-unit").value.trim();
    var weekInputs = document.querySelectorAll(".gf-week");
    data.weeks = Array.prototype.map.call(weekInputs, function(inp){ return Number(inp.value) || 0; });
  } else if(type === "total"){
    data.totalTarget = Number(document.getElementById("gf-total-target").value);
    data.unit = document.getElementById("gf-unit").value.trim();
  }
  return data;
}
function validateGoalData(data){
  if(!data.name){ alert("名前を入力してね"); return false; }
  if(data.type === "daily" && data.mode === "number"){
    if(!data.unit){ alert("単位を入力してね"); return false; }
    if(!(data.target > 0)){ alert("目標の数字を正しく入力してね"); return false; }
  }
  if(data.type === "weekly"){
    if(!data.unit){ alert("単位を入力してね"); return false; }
  }
  if(data.type === "total"){
    if(!data.unit){ alert("単位を入力してね"); return false; }
    if(!(data.totalTarget > 0)){ alert("目標の数字を正しく入力してね"); return false; }
  }
  return true;
}
function syncGoalFormFromDomPartial(){
  var f = ui.goalForm;
  var nameEl = document.getElementById("gf-name");
  if(nameEl) f.name = nameEl.value;
  var unitEl = document.getElementById("gf-unit");
  if(unitEl) f.unit = unitEl.value;
  var targetEl = document.getElementById("gf-target");
  if(targetEl) f.target = Number(targetEl.value) || 0;
  var totalTargetEl = document.getElementById("gf-total-target");
  if(totalTargetEl) f.totalTarget = Number(totalTargetEl.value) || 0;
  var weekInputs = document.querySelectorAll(".gf-week");
  if(weekInputs.length) f.weeks = Array.prototype.map.call(weekInputs, function(inp){ return Number(inp.value) || 0; });
}

document.addEventListener("DOMContentLoaded", function(){
  var modalRoot = document.getElementById("modalRoot");

  modalRoot.addEventListener("change", function(e){
    if(!ui.goalForm) return;
    if(e.target.id === "gf-type"){
      syncGoalFormFromDomPartial();
      var type = e.target.value;
      ui.goalForm.type = type;
      if(type === "daily" && !ui.goalForm.mode) ui.goalForm.mode = "check";
      renderGoalModal();
    } else if(e.target.id === "gf-mode"){
      syncGoalFormFromDomPartial();
      ui.goalForm.mode = e.target.value;
      renderGoalModal();
    }
  });

  modalRoot.addEventListener("click", function(e){
    var btn;
    if(e.target.classList.contains("sheet-overlay")){
      closeGoalModal();
      return;
    }
    if((btn = e.target.closest('[data-action="goal-form-cancel"]'))){
      closeGoalModal();
      return;
    }
    if((btn = e.target.closest('[data-action="goal-form-save"]'))){
      var data = readGoalFormFromDom();
      if(!validateGoalData(data)) return;
      if(ui.goalForm.formMode === "edit"){
        var goalId = ui.goalForm.id;
        showConfirm("目標『" + data.name + "』の設定を変えます。よろしいですか?", function(){
          updateGoal(goalId, data);
          closeGoalModal();
          refreshCurrentScreen();
        });
      } else {
        addGoal(data);
        closeGoalModal();
        refreshCurrentScreen();
      }
      return;
    }
  });
});

/* ===================== 画面切り替え ===================== */
function switchScreen(name){
  ui.screen = name;
  document.getElementById("screen-today").hidden = name !== "today";
  document.getElementById("screen-graph").hidden = name !== "graph";
  document.getElementById("screen-settings").hidden = name !== "settings";
  document.querySelectorAll(".tabbar__btn").forEach(function(b){
    b.classList.toggle("is-active", b.dataset.screen === name);
  });
  document.getElementById("navBarTitle").textContent = { today:"今日", graph:"グラフ", settings:"設定" }[name];
  if(name === "today") renderToday();
  else if(name === "graph") renderGraph();
  else renderSettings();
  window.scrollTo(0, 0);
  updateNavBarCollapse();
}
function updateNavBarCollapse(){
  var navBar = document.getElementById("navBar");
  if(!navBar) return;
  navBar.classList.toggle("is-collapsed", window.scrollY > 24);
}

/* ===================== 今日画面 ===================== */
function largeTitleHtml(title){
  return '<h1 class="large-title">' + esc(title) + '</h1>';
}

function renderToday(){
  var el = document.getElementById("screen-today");
  var period = getActivePeriod();
  var goals = getGoalsOfActivePeriod();
  var titleHtml = largeTitleHtml("今日");

  if(!period){
    el.innerHTML = titleHtml + emptyStateHtml("期間がまだありません。\n「設定」タブから期間を作ってね!");
    return;
  }
  if(goals.length === 0){
    el.innerHTML = titleHtml + emptyStateHtml("目標がまだありません。\n「設定」タブから目標を追加してね!");
    return;
  }

  if(!ui.todayDate) ui.todayDate = todayStr();
  ui.todayDate = clampDateToPeriod(ui.todayDate, period);
  var date = ui.todayDate;

  var html = titleHtml;
  html += '<div class="date-nav">';
  html += '<button class="date-nav__btn" data-action="prev-day" ' + (date <= period.start ? "disabled" : "") + '>◀</button>';
  html += '<div class="date-nav__label">' + esc(formatMD(date)) + '</div>';
  html += '<button class="date-nav__btn" data-action="next-day" ' + (date >= period.end ? "disabled" : "") + '>▶</button>';
  html += '</div>';

  if(date !== todayStr()){
    html += '<div class="today-banner">' + esc(formatMD(date)) + 'の記録を編集中</div>';
  }

  goals.forEach(function(goal){
    html += goalCardHtml(goal, date, period);
  });

  el.innerHTML = html;
}

function emptyStateHtml(text){
  return '<div class="empty-state">' +
    '<div class="empty-state__text">' + esc(text) + '</div>' +
    '<button class="btn btn--primary" data-action="goto-settings">設定へ行く</button>' +
    '</div>';
}

function goalCardHeaderHtml(goal, extra){
  return '<div class="goal-card__title">' + esc(goal.name) + (extra || "") + '</div>';
}

function goalCardHtml(goal, date, period){
  var rec = findRecord(date, goal.id);
  if(goal.type === "daily" && goal.mode === "check"){
    var done = !!rec && rec.value === 1;
    return '<div class="goal-card" data-goal-id="' + goal.id + '">' +
      goalCardHeaderHtml(goal) +
      '<button class="goal-card__big-btn ' + (done ? "is-done" : "") + '" data-action="toggle-check" data-goal-id="' + goal.id + '">' +
        (done ? "できた! ✅" : "できた!") +
      '</button>' +
    '</div>';
  }
  if(goal.type === "daily" && goal.mode === "number"){
    var val = rec ? rec.value : "";
    var achieved = !!rec && rec.value >= goal.target;
    return '<div class="goal-card" data-goal-id="' + goal.id + '">' +
      goalCardHeaderHtml(goal) +
      '<div class="goal-card__target">目標: ' + goal.target + esc(goal.unit) + '</div>' +
      '<div class="goal-card__input-row">' +
        '<input type="number" inputmode="numeric" class="goal-card__input" data-goal-input="' + goal.id + '" value="' + val + '">' +
        '<button class="btn btn--primary" data-action="record-number" data-goal-id="' + goal.id + '">記録</button>' +
      '</div>' +
      (achieved ? '<div class="goal-card__achieved">✅ 達成!</div>' : '') +
    '</div>';
  }
  if(goal.type === "weekly"){
    var weekNum = weekNumberOf(period, date);
    var target = weeklyTargetFor(goal, weekNum);
    var wval = rec ? rec.value : "";
    var wachieved = !!rec && rec.value >= target;
    return '<div class="goal-card" data-goal-id="' + goal.id + '">' +
      goalCardHeaderHtml(goal, '<span class="goal-card__week">第' + weekNum + '週</span>') +
      '<div class="goal-card__target">目標: ' + target + esc(goal.unit) + '</div>' +
      '<div class="goal-card__input-row">' +
        '<input type="number" inputmode="numeric" class="goal-card__input" data-goal-input="' + goal.id + '" value="' + wval + '">' +
        '<button class="btn btn--primary" data-action="record-number" data-goal-id="' + goal.id + '">記録</button>' +
      '</div>' +
      (wachieved ? '<div class="goal-card__achieved">✅ 達成!</div>' : '') +
    '</div>';
  }
  if(goal.type === "total"){
    var sum = recordsOfGoal(goal.id).reduce(function(s,r){ return s + r.value; }, 0);
    var tval = rec ? rec.value : "";
    var remain = Math.max(goal.totalTarget - sum, 0);
    return '<div class="goal-card" data-goal-id="' + goal.id + '">' +
      goalCardHeaderHtml(goal) +
      '<div class="goal-card__target">今日進んだ' + esc(goal.unit) + '数</div>' +
      '<div class="goal-card__input-row">' +
        '<input type="number" inputmode="numeric" class="goal-card__input" data-goal-input="' + goal.id + '" value="' + tval + '">' +

function goalAchievedForDate(goal, date, period){
  var rec = findRecord(date, goal.id);
  if(goal.type === "daily" && goal.mode === "check") return !!rec && rec.value === 1;
  if(goal.type === "daily" && goal.mode === "number") return !!rec && rec.value >= goal.target;
  if(goal.type === "weekly"){
    var wn = weekNumberOf(period, date);
    var t = weeklyTargetFor(goal, wn);
    return !!rec && rec.value >= t;
  }
  if(goal.type === "total") return !!rec;
  return false;
}
function totalSumAchieved(goal){
  if(goal.type !== "total") return false;
  var sum = recordsOfGoal(goal.id).reduce(function(s,r){ return s + r.value; }, 0);
  return sum >= goal.totalTarget;
}
function allGoalsAchievedForDate(date, period){
  var goals = getGoalsOfActivePeriod();
  if(!goals.length) return false;
  return goals.every(function(g){ return goalAchievedForDate(g, date, period); });
}
function withAchievementCelebration(goal, date, action){
  var period = getActivePeriod();
  var beforeSingle = goalAchievedForDate(goal, date, period);
  var beforeAll = allGoalsAchievedForDate(date, period);
  var beforeTotal = totalSumAchieved(goal);

  action();

  if(date !== todayStr()) return;
  var afterSingle = goalAchievedForDate(goal, date, period);
  var afterAll = allGoalsAchievedForDate(date, period);
  var afterTotal = totalSumAchieved(goal);

  if(goal.type === "total" && !beforeTotal && afterTotal){
    playQuestCelebration();
  } else if(!beforeAll && afterAll){
    playDayCelebration();
  } else if(goal.type !== "total" && !beforeSingle && afterSingle){
    playSingleCelebration(goal.id);
  }
}

function onDailyCheckClick(goalId){
  var goal = state.goals.find(function(g){ return g.id === goalId; });
  var date = ui.todayDate;
  var rec = findRecord(date, goalId);

    withAchievementCelebration(goal, date, function(){
      setRecord(date, goalId, 1);
      renderToday();
    });
  } else {
    showConfirm(formatMD(date) + "の『" + goal.name + "』の記録を取り消します。よろしいですか?", function(){
      deleteRecord(date, goalId);

}

function onRecordNumberClick(goalId){
  var goal = state.goals.find(function(g){ return g.id === goalId; });
  var input = document.querySelector('[data-goal-input="' + goalId + '"]');
  var raw = input.value;
  if(raw === "" || isNaN(Number(raw)) || Number(raw) < 0){
    alert("数字を正しく入力してね");
    return;
  }
  var value = Number(raw);
  var date = ui.todayDate;
  var existing = findRecord(date, goalId);
  if(existing && existing.value !== value){
    showConfirm(formatMD(date) + "の『" + goal.name + "』の記録を " + existing.value + esc(goal.unit || "") + " → " + value + esc(goal.unit || "") + " に変えます。よろしいですか?", function(){
      withAchievementCelebration(goal, date, function(){
        setRecord(date, goalId, value);
        renderToday();
      });
    });
  } else if(!existing){
    withAchievementCelebration(goal, date, function(){
      setRecord(date, goalId, value);
      renderToday();
    });
  }
}

function renderGraph(){
  var el = document.getElementById("screen-graph");
  var period = getActivePeriod();
  var goals = getGoalsOfActivePeriod();
  var titleHtml = largeTitleHtml("グラフ");

  if(!period){
    el.innerHTML = titleHtml + emptyStateHtml("期間がまだありません。\n「設定」タブから期間を作ってね!");
    return;
  }
  if(goals.length === 0){
    el.innerHTML = titleHtml + emptyStateHtml("目標がまだありません。\n「設定」タブから目標を追加してね!");
    return;
  }

  var html = titleHtml;
  html += summaryCardHtml(period, goals);
  goals.forEach(function(goal){
    if(goal.type === "total") html += totalGraphCardHtml(goal, period);
    else if(goal.type === "daily") html += dailyGraphCardHtml(goal, period);
    else if(goal.type === "weekly") html += weeklyGraphCardHtml(goal, period);
  });
  el.innerHTML = html;
}

function summaryCardHtml(period, goals){
  var totalDays = periodTotalDays(period);
  var today = todayStr();
  var elapsed;
  if(today < period.start) elapsed = 0;
  else if(today > period.end) elapsed = totalDays;
  else elapsed = dateDiffDays(period.start, today) + 1;

  var achievedCount = 0;
  goals.forEach(function(goal){
    var rec = findRecord(today, goal.id);
    if(goal.type === "daily" && goal.mode === "check"){
      if(rec && rec.value === 1) achievedCount++;
    } else if(goal.type === "daily" && goal.mode === "number"){
      if(rec && rec.value >= goal.target) achievedCount++;
    } else if(goal.type === "weekly"){
      var wn = weekNumberOf(period, today);
      var t = weeklyTargetFor(goal, wn);
      if(rec && rec.value >= t) achievedCount++;
    } else if(goal.type === "total"){
      if(rec) achievedCount++;
    }
  });
  var rate = goals.length ? Math.round(achievedCount / goals.length * 100) : 0;

  return '<div class="summary-card">' +
    '<div class="summary-card__row"><span>期間</span><span>' + esc(period.name) + '</span></div>' +
    '<div class="summary-card__row"><span>経過日数</span><span>' + elapsed + ' / ' + totalDays + ' 日</span></div>' +
    '<div class="summary-card__row"><span>今日の達成率</span><span>' + rate + '% (' + achievedCount + '/' + goals.length + ')</span></div>' +
  '</div>';
}

function svgLine(points){
  return points.map(function(p, i){ return (i===0?"M":"L") + p[0].toFixed(1) + "," + p[1].toFixed(1); }).join(" ");
}

function graphCardHeaderHtml(goal){
  return '<div class="graph-card__title">' + esc(goal.name) + '</div>';
}

function totalGraphCardHtml(goal, period){
  var W = 300, H = 160, padL = 34, padR = 10, padT = 12, padB = 20;
  var dates = [];
  var d = period.start;
  while(d <= period.end){ dates.push(d); d = addDays(d, 1); }
  var n = dates.length;

  var recMap = {};
  recordsOfGoal(goal.id).forEach(function(r){ recMap[r.date] = r.value; });

  var cum = 0;
  var actualVals = dates.map(function(dt){
    if(recMap.hasOwnProperty(dt)) cum += recMap[dt];
    return cum;
  });
  var maxY = Math.max(goal.totalTarget, actualVals[actualVals.length-1] || 0) * 1.05 || 1;

  function sx(i){ return padL + (n<=1?0:(i/(n-1)) * (W-padL-padR)); }
  function sy(v){ return H-padB - (v/maxY) * (H-padT-padB); }

  var actualPoints = actualVals.map(function(v,i){ return [sx(i), sy(v)]; });
  var idealPoints = [[sx(0), sy(0)], [sx(n-1), sy(goal.totalTarget)]];

  var today = clampDateToPeriod(todayStr(), period);
  var todayIdx = dateDiffDays(period.start, today);
  var actualToday = actualVals[todayIdx] || 0;
  var idealToday = goal.totalTarget * (todayIdx / Math.max(n-1,1));
  var note;
  if(actualToday >= idealToday){
    note = "予定より早い!";
  } else {
    note = "あと" + Math.ceil(idealToday - actualToday) + esc(goal.unit) + "で予定通り!";
  }

  var achieveIdx = -1;
  for(var ai=0; ai<actualVals.length; ai++){
    if(actualVals[ai] >= goal.totalTarget){ achieveIdx = ai; break; }
  }
  var achieveMark = "";
  if(achieveIdx >= 0){
    var ap = actualPoints[achieveIdx];
    var markX = ap[0], markY = ap[1]-7;
    if(markX < padL+46 && markY < 22){ markX = padL+46; markY = 10; }
    achieveMark = '<text x="' + markX.toFixed(1) + '" y="' + markY.toFixed(1) + '" font-size="13" text-anchor="middle" fill="var(--color-main-dark)">✦</text>';
  }

  var gradId = "totalGrad-" + goal.id;
  var svg = '<svg class="graph-card__svg" viewBox="0 0 ' + W + ' ' + H + '">' +
    '<defs><linearGradient id="' + gradId + '" x1="0" y1="0" x2="1" y2="0">' +
      '<stop offset="0%" stop-color="#c9bdf0"/>' +
      '<stop offset="100%" stop-color="var(--color-main)"/>' +
    '</linearGradient></defs>' +
    '<line x1="' + padL + '" y1="' + (H-padB) + '" x2="' + (W-padR) + '" y2="' + (H-padB) + '" stroke="var(--color-axis)"/>' +
    '<line x1="' + padL + '" y1="' + padT + '" x2="' + padL + '" y2="' + (H-padB) + '" stroke="var(--color-axis)"/>' +
    '<text x="' + padL + '" y="10" font-size="9" fill="var(--color-axis-text)">' + goal.totalTarget + esc(goal.unit) + '</text>' +
    '<path d="' + svgLine(idealPoints) + '" fill="none" stroke="var(--color-ideal-line)" stroke-width="2" stroke-dasharray="4,3"/>' +
    '<path d="' + svgLine(actualPoints) + '" fill="none" stroke="url(#' + gradId + ')" stroke-width="2.5"/>' +
    achieveMark +
    '</svg>';

  return '<div class="graph-card">' +
    graphCardHeaderHtml(goal) +
    svg +
    '<div class="graph-card__note">' + note + '</div>' +
  '</div>';
}

function computeAchievedMap(goal, period){
  var map = {};
  var d = period.start;
  while(d <= period.end){
    var rec = findRecord(d, goal.id);
    var achieved;
    var recorded = !!rec;
    if(goal.mode === "check"){
      achieved = recorded && rec.value === 1;
    } else {
      achieved = recorded && rec.value >= goal.target;
    }
    map[d] = { achieved: achieved, recorded: recorded };
    d = addDays(d, 1);
  }
  return map;
}
function currentStreak(map, period){
  var todayC = todayStr();
  var end;
  if(todayC < period.start) return 0;
  end = todayC > period.end ? period.end : todayC;
  var d = end;
  if(!map[d].achieved && d === todayC) d = addDays(d, -1);
  var streak = 0;
  while(d >= period.start && map[d] && map[d].achieved){
    streak++;
    d = addDays(d, -1);
  }
  return streak;
}
function longestStreak(map, period){
  var longest = 0, cur = 0;
  var d = period.start;
  while(d <= period.end){
    if(map[d].achieved){ cur++; longest = Math.max(longest, cur); } else cur = 0;
    d = addDays(d, 1);
  }
  return longest;
}
var WEEKDAY_LABELS = ["日","月","火","水","木","金","土"];

function calendarHtml(map, period){
  var html = '<div class="calendar">';
  var d = period.start;
  var curMonth = null;
  var monthOpen = false;
  while(d <= period.end){
    var parts = d.split("-");
    var monthKey = parts[0] + "-" + parts[1];
    if(monthKey !== curMonth){
      if(monthOpen) html += '</div>';
      curMonth = monthKey;
      html += '<div class="calendar__month-title">' + Number(parts[1]) + '月</div>';
      html += '<div class="calendar__grid">';
      WEEKDAY_LABELS.forEach(function(w){ html += '<div class="calendar__weekday">' + w + '</div>'; });
      var wd = parseDate(d).getDay();
      for(var i=0;i<wd;i++) html += '<div class="calendar__day calendar__day--empty"></div>';
      monthOpen = true;
    }
    var info = map[d];
    var cls = "calendar__day";
    var mark = "";
    if(info.achieved){ cls += " calendar__day--achieved"; mark = "✦"; }
    else if(info.recorded){ cls += " calendar__day--partial"; mark = "△"; }
    html += '<div class="' + cls + '">' + Number(parts[2]) + (mark ? '<span class="calendar__day-mark">'+mark+'</span>' : '') + '</div>';
    d = addDays(d, 1);
  }
  if(monthOpen) html += '</div>';
  html += '</div>';
  return html;
}

function dailyGraphCardHtml(goal, period){
  var map = computeAchievedMap(goal, period);
  var streak = currentStreak(map, period);
  var longest = longestStreak(map, period);
  return '<div class="graph-card">' +
    graphCardHeaderHtml(goal) +
    '<div class="graph-card__streak">🔥 ' + streak + '日連続!(最長' + longest + '日)</div>' +
    calendarHtml(map, period) +
  '</div>';
}

function weeklyGraphCardHtml(goal, period){
  var totalWeeks = periodTotalWeeks(period);
  var weeks = [];
  for(var w=1; w<=totalWeeks; w++){
    var target = weeklyTargetFor(goal, w);
    var sum = 0, count = 0;
    var d = period.start;
    while(d <= period.end){
      if(weekNumberOf(period, d) === w){
        var rec = findRecord(d, goal.id);
        if(rec){ sum += rec.value; count++; }
      }
      d = addDays(d, 1);
    }
    weeks.push({ week: w, target: target, avg: count ? sum/count : 0 });
  }

  var W = 300, H = 160, padL = 30, padR = 10, padT = 12, padB = 20;
  var maxY = Math.max.apply(null, weeks.map(function(x){ return Math.max(x.target, x.avg); }).concat([1])) * 1.15;
  var barW = (W-padL-padR) / weeks.length * 0.6;
  var slot = (W-padL-padR) / weeks.length;
  function sy(v){ return H-padB - (v/maxY)*(H-padT-padB); }

  var bars = weeks.map(function(x,i){
    var cx = padL + slot*i + slot/2;
    var barX = cx - barW/2;
    var barY = sy(x.avg);
    var barH = (H-padB) - barY;
    var tickY = sy(x.target);
    return '<rect x="' + barX.toFixed(1) + '" y="' + barY.toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + Math.max(barH,0).toFixed(1) + '" fill="var(--color-main)" rx="2"/>' +
      '<line x1="' + (barX-2).toFixed(1) + '" y1="' + tickY.toFixed(1) + '" x2="' + (barX+barW+2).toFixed(1) + '" y2="' + tickY.toFixed(1) + '" stroke="var(--color-danger)" stroke-width="2"/>' +
      '<text x="' + cx.toFixed(1) + '" y="' + (H-6) + '" font-size="9" fill="var(--color-axis-text)" text-anchor="middle">' + x.week + 'W</text>';
  }).join("");

  var svg = '<svg class="graph-card__svg" viewBox="0 0 ' + W + ' ' + H + '">' +
    '<line x1="' + padL + '" y1="' + (H-padB) + '" x2="' + (W-padR) + '" y2="' + (H-padB) + '" stroke="var(--color-axis)"/>' +
    bars +
    '</svg>';

  var achievedMapForCalendar = {};
  var dd = period.start;
  while(dd <= period.end){
    var rec = findRecord(dd, goal.id);
    var wn = weekNumberOf(period, dd);
    var t = weeklyTargetFor(goal, wn);
    achievedMapForCalendar[dd] = { achieved: !!rec && rec.value >= t, recorded: !!rec };
    dd = addDays(dd, 1);
  }

  return '<div class="graph-card">' +
    graphCardHeaderHtml(goal) +
    svg +
    calendarHtml(achievedMapForCalendar, period) +
  '</div>';
}

    '<div class="form-actions">' +
      '<button class="btn btn--sub" data-action="period-form-cancel">キャンセル</button>' +
      '<button class="btn btn--primary" data-action="period-form-save">保存</button>' +
    '</div>' +
  '</div>';
}

function goalSectionHtml(){
  var period = getActivePeriod();
  var html = '<div class="settings-section">';
  html += '<h2 class="settings-section__title">目標の管理</h2>';
  if(!period){
    html += '<div class="empty-state__text" style="margin:0 0 10px;">先に期間を作ってね</div>';
    html += '</div>';
    return html;
  }
  var goals = getGoalsOfActivePeriod();
  var typeLabel = { daily:"毎日", weekly:"週ごと", total:"合計" };
  if(goals.length){
    html += '<div class="list-group">';
    goals.forEach(function(g, i){
      var sub = "";
      if(g.type === "daily") sub = g.mode === "check" ? "○×式" : ("目標 " + g.target + esc(g.unit));
      else if(g.type === "weekly") sub = "週別目標(" + esc(g.unit) + ")";
      else if(g.type === "total") sub = "合計 " + g.totalTarget + esc(g.unit);
      html += '<div class="list-row" data-row-action="edit-goal" data-row-id="' + g.id + '">' +
        '<div class="list-row__main">' +
          '<div class="list-row__name">' + esc(g.name) + '<span class="badge">' + typeLabel[g.type] + '</span></div>' +
          '<div class="list-row__sub">' + sub + '</div>' +
        '</div>' +
        '<div class="list-row__actions">' +
          '<button class="btn btn--plain btn--icon" data-action="goal-move-up" data-id="' + g.id + '" ' + (i===0?"disabled":"") + ' aria-label="上へ">↑</button>' +
          '<button class="btn btn--plain btn--icon" data-action="goal-move-down" data-id="' + g.id + '" ' + (i===goals.length-1?"disabled":"") + ' aria-label="下へ">↓</button>' +
          '<button class="btn btn--plain btn--icon btn--danger-text" data-action="delete-goal" data-id="' + g.id + '" aria-label="削除">✕</button>' +
        '</div>' +
        '<span class="list-row__chevron" aria-hidden="true">›</span>' +
      '</div>';
    });
    html += '</div>';
  }

  html += '<button class="btn btn--primary btn--block" data-action="add-goal-open">＋ 目標を追加する</button>';
  html += '</div>';
  return html;
}

function resetSectionHtml(){
  return '<div class="settings-section">' +
    '<h2 class="settings-section__title">記録をリセット</h2>' +
    '<button class="btn btn--danger btn--block" data-action="reset-all">すべての記録を削除</button>' +
  '</div>';
}

/* ---- 設定画面イベント ---- */
document.addEventListener("DOMContentLoaded", function(){
  var settingsEl = document.getElementById("screen-settings");

  settingsEl.addEventListener("click", function(e){
    var btn;

    if((btn = e.target.closest('[data-action="add-period-open"]'))){
      ui.periodForm = { mode:"add", name:"", start:"", end:"" };
      return renderSettings();
    }
    if((btn = e.target.closest('[data-action="period-form-cancel"]'))){
      ui.periodForm = null;
      return renderSettings();
    }
    if((btn = e.target.closest('[data-action="period-form-save"]'))){
      var name = document.getElementById("pf-name").value.trim();
      var start = document.getElementById("pf-start").value;
      var end = document.getElementById("pf-end").value;
      if(!name || !start || !end){ alert("入力内容を確認してね"); return; }
      if(start > end){ alert("開始は終了より前の日付にしてね"); return; }
      var f = ui.periodForm;
      if(f.mode === "add"){
        addPeriod({ name:name, start:start, end:end });
        ui.periodForm = null;
        renderSettings();
      } else {
        showConfirm("期間『" + name + "』の設定を変えます。よろしいですか?", function(){
          updatePeriod(f.id, { name:name, start:start, end:end });
          ui.periodForm = null;
          renderSettings();
        });
      }
      return;
    }
    if((btn = e.target.closest('[data-action="open-period"]'))){
      openPeriod(btn.dataset.id);
      return renderSettings();
    }
    if((btn = e.target.closest('[data-action="delete-period"]'))){
      var p2 = state.periods.find(function(x){ return x.id === btn.dataset.id; });
      showConfirm("期間『" + p2.name + "』を削除します。目標と記録も全部消えます。よろしいですか?", function(){
        deletePeriod(p2.id);
        renderSettings();
      }, { danger:true });
      return;
    }

    if((btn = e.target.closest('[data-action="add-goal-open"]'))){
      return openGoalModal("add");
    }
    if((btn = e.target.closest('[data-action="goal-move-up"]'))){
      moveGoal(btn.dataset.id, -1);
      return renderSettings();
    }
    if((btn = e.target.closest('[data-action="goal-move-down"]'))){
      moveGoal(btn.dataset.id, 1);
      return renderSettings();
    }
    if((btn = e.target.closest('[data-action="delete-goal"]'))){
      var g2 = state.goals.find(function(x){ return x.id === btn.dataset.id; });
      showConfirm("目標『" + g2.name + "』を削除します。記録も消えます。よろしいですか?", function(){
        deleteGoal(g2.id);
        renderSettings();
      }, { danger:true });
      return;
    }
    if((btn = e.target.closest('[data-action="reset-all"]'))){
      showConfirm("すべての記録を削除します。よろしいですか?", function(){
        showConfirm("本当に削除しますか?元に戻せません", function(){
          resetAllData();
          switchScreen("today");
        }, { danger:true, okLabel:"削除" });
      }, { danger:true });
      return;
    }

    if((btn = e.target.closest('.list-row[data-row-action="edit-period"]'))){
      var pRow = state.periods.find(function(x){ return x.id === btn.dataset.rowId; });
      ui.periodForm = { mode:"edit", id:pRow.id, name:pRow.name, start:pRow.start, end:pRow.end };
      return renderSettings();
    }
    if((btn = e.target.closest('.list-row[data-row-action="edit-goal"]'))){
      var gRow = state.goals.find(function(x){ return x.id === btn.dataset.rowId; });
      return openGoalModal("edit", gRow);
    }
  });
});

/* ===================== タブ切り替え・初期化 ===================== */
document.addEventListener("DOMContentLoaded", function(){
  document.querySelectorAll(".tabbar__btn").forEach(function(b){
    b.addEventListener("click", function(){ switchScreen(b.dataset.screen); });
  });
  window.addEventListener("scroll", updateNavBarCollapse, { passive:true });
});

function init(){
  state = loadState();
  ui.todayDate = todayStr();
  switchScreen("today");
}
document.addEventListener("DOMContentLoaded", init);
